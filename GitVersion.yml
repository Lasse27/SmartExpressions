mode: ContinuousDelivery
tag-prefix: '[vV]'
next-version: 1.0.0

branches:
  master:
    regex: ^master$
    increment: Minor
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false

  development:
    regex: ^development$
    increment: Minor
    tag: alpha
    track-merge-target: true
    source-branches:
      - master

ignore:
  sha: []
