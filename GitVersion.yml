mode: ContinuousDeployment
tag-prefix: '[vV]'
next-version: 1.0.0
commit-message-incrementing: Enabled

major-version-bump-message: '\+semver:\s?(major|breaking)'
minor-version-bump-message: '^(feat)(\(.+\))?:'
patch-version-bump-message: '^(fix|perf|refactor)(\(.+\))?:'

branches:
  master:
    regex: ^master$
    increment: Patch
    is-release-branch: true
